{% extends 'base.html' %}

{% block title %}Create Task{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-4">Create Production Task</h1>

    <form method="POST" class="space-y-4">
        <div>
            <label class="block mb-1 font-medium">Title</label>
            <input type="text" name="title" class="w-full border rounded px-3 py-2" required>
        </div>

        <div>
            <label class="block mb-1 font-medium">Description</label>
            <textarea name="description" rows="4" class="w-full border rounded px-3 py-2"></textarea>
        </div>

        <div>
            <label class="block mb-1 font-medium">Assign to Worker</label>
            <select name="assigned_to" class="w-full border rounded px-3 py-2" required>
                <option value="">Select worker</option>
                {% for worker in workers %}
                <option value="{{ worker['id'] }}">{{ worker['username'] }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Create Task</button>
    </form>
</div>
{% endblock %}
