{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded p-6">
  <h1 class="text-2xl font-bold mb-4">Login</h1>

  <form method="POST" class="space-y-4">
    <div>
      <label class="block mb-1 font-medium">Username</label>
      <input type="text" name="username" required class="w-full border rounded px-3 py-2" />
    </div>

    <div>
      <label class="block mb-1 font-medium">Password</label>
      <input type="password" name="password" required class="w-full border rounded px-3 py-2" />
    </div>

    <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
  </form>

  <p class="mt-4 text-sm">
    New staff user? <a href="{{ url_for('register') }}" class="text-blue-600 hover:underline">Register</a>
  </p>

  <div class="mt-4 text-xs text-gray-600 space-y-1">
    <p>Default admin: <strong>admin / admin123</strong></p>
    <p>Default manager: <strong>manager / manager123</strong></p>
  </div>
</div>
{% endblock %}
