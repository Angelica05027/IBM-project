{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded p-6">
  <h1 class="text-2xl font-bold mb-4">Staff Registration</h1>

  <form method="POST" class="space-y-4">
    <div>
      <label class="block mb-1 font-medium">Username</label>
      <input type="text" name="username" required class="w-full border rounded px-3 py-2" />
    </div>

    <div>
      <label class="block mb-1 font-medium">Password</label>
      <input type="password" name="password" required class="w-full border rounded px-3 py-2" />
    </div>

    <button class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Register</button>
  </form>

  <p class="mt-4 text-sm">
    Already have an account? <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline">Login</a>
  </p>
</div>
{% endblock %}
